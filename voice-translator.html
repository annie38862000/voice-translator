<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時語音翻譯</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    background: #f5f5f7; color: #1d1d1f;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  .top-bar {
    flex-shrink: 0; display: flex; align-items: center; gap: 10px;
    padding: 14px 20px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid #e0e0e5;
  }
  .top-bar h1 { font-size: 1rem; font-weight: 600; color: #1d1d1f; letter-spacing: -0.02em; }
  .top-bar span { font-size: 0.8rem; color: #86868b; }

  .convo-area {
    flex: 1; overflow-y: auto;
    padding: 20px 20px 100px;
    background: #fff;
    display: flex; flex-direction: column; gap: 16px;
  }
  .convo-area::-webkit-scrollbar { width: 4px; }
  .convo-area::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 4px; }

  .sentence {
    display: flex; flex-direction: column; gap: 4px;
    padding-bottom: 16px; border-bottom: 1px solid #f0f0f5;
    animation: fadeIn 0.25s ease;
  }
  .sentence:last-child { border-bottom: none; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .original {
    font-size: 1.25rem; line-height: 1.7;
    color: #1d1d1f; letter-spacing: -0.01em;
  }
  .original.interim { color: #b0b0b8; font-style: italic; }
  .translation {
    font-size: 1.25rem; line-height: 1.7;
    color: #0071e3; letter-spacing: -0.01em;
  }
  .translating { color: #c0c0c8 !important; font-style: italic; font-size: 0.9rem !important; }

  .empty-hint { color: #c7c7cc; font-size: 0.9rem; text-align: center; margin: auto; }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 14px 20px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid #e0e0e5;
    z-index: 10;
  }
  .status-pill {
    position: absolute; left: 20px;
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75rem; font-weight: 500; color: #86868b;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #d2d2d7; transition: background 0.3s; flex-shrink: 0;
  }
  .dot.listening  { background: #ff3b30; animation: pulse 1.2s infinite; }
  .dot.processing { background: #ff9f0a; animation: pulse 0.6s infinite; }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(1.4); }
  }
  .mic-btn {
    width: 56px; height: 56px; border-radius: 50%; border: none;
    background: #0071e3; color: white; font-size: 1.4rem; cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(0,113,227,0.35);
    display: flex; align-items: center; justify-content: center;
  }
  .mic-btn:hover { background: #0077ed; transform: scale(1.06); }
  .mic-btn:active { transform: scale(0.96); }
  .mic-btn.active {
    background: #ff3b30;
    box-shadow: 0 2px 12px rgba(255,59,48,0.4);
    animation: ring 1.6s infinite;
  }
  @keyframes ring {
    0%  { box-shadow: 0 0 0 0    rgba(255,59,48,0.4); }
    70% { box-shadow: 0 0 0 14px rgba(255,59,48,0);   }
    100%{ box-shadow: 0 0 0 0    rgba(255,59,48,0);   }
  }
  .clear-btn {
    position: absolute; right: 20px;
    background: none; border: none; color: #0071e3;
    font-size: 0.82rem; font-family: inherit; font-weight: 500;
    cursor: pointer; padding: 6px 4px; transition: opacity 0.2s;
  }
  .clear-btn:hover { opacity: 0.65; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>🎙 即時翻譯</h1>
  <span>自動偵測語言・雙語輸出</span>
</div>

<div class="convo-area" id="convoArea">
  <span class="empty-hint">開始收音後，對話將顯示於此…</span>
</div>

<div class="bottom-bar">
  <div class="status-pill">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">待機中</span>
  </div>
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <button class="clear-btn" onclick="clearAll()">清除</button>
</div>

<script>
// ── State ──
var recognition = null;
var isListening = false;
var currentLang = 'zh-TW';
var interimBlock = null;

// ── Helpers ──
function getConvo() { return document.getElementById('convoArea'); }

function removeEmptyHint() {
  var hint = getConvo().querySelector('.empty-hint');
  if (hint) hint.remove();
}

function scrollBottom() {
  var c = getConvo(); c.scrollTop = c.scrollHeight;
}

function setStatus(type, text) {
  var d = document.getElementById('statusDot');
  d.className = 'dot';
  if (type === 'listening')  d.classList.add('listening');
  if (type === 'processing') d.classList.add('processing');
  document.getElementById('statusText').textContent = text;
}

function detectLang(text) {
  return /[\u4e00-\u9fff\u3400-\u4dbf]/.test(text) ? 'zh' : 'en';
}

// ── DOM ──
function createBlock(text, isInterim) {
  var block = document.createElement('div');
  block.className = 'sentence';
  var orig = document.createElement('div');
  orig.className = 'original' + (isInterim ? ' interim' : '');
  orig.textContent = text;
  var trans = document.createElement('div');
  trans.className = 'translation';
  block.appendChild(orig);
  block.appendChild(trans);
  return block;
}

// ── Translation ──
async function translateAndFill(text, block) {
  var tEl = block.querySelector('.translation');
  var detected = detectLang(text);
  var src = detected === 'zh' ? 'zh-TW' : 'en-US';
  var tgt = detected === 'zh' ? 'en-US' : 'zh-TW';

  tEl.textContent = '…';
  tEl.classList.add('translating');
  setStatus('processing', '翻譯中…');

  try {
    var url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + src + '|' + tgt;
    var resp = await fetch(url);
    var data = await resp.json();
    if (data.responseStatus !== 200) throw new Error(data.responseDetails);
    tEl.textContent = data.responseData.translatedText;
    tEl.classList.remove('translating');
  } catch(e) {
    tEl.textContent = '（翻譯失敗）';
    tEl.classList.remove('translating');
  }
  setStatus('listening', '收音中…');
  scrollBottom();
}

// ── Speech Recognition ──
function initRecognition(lang) {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('error', '⚠ 請使用 Chrome'); return null; }

  var r = new SR();
  r.continuous = false;
  r.interimResults = true;
  r.lang = lang;

  r.onstart = function() { setStatus('listening', '收音中…'); };

  r.onerror = function(e) {
    if (e.error !== 'no-speech') setStatus('idle', '錯誤：' + e.error);
  };

  r.onresult = function(e) {
    removeEmptyHint();
    var interimText = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      var t = e.results[i][0].transcript.trim();
      if (e.results[i].isFinal) {
        if (interimBlock) { interimBlock.remove(); interimBlock = null; }
        var block = createBlock(t, false);
        getConvo().appendChild(block);
        scrollBottom();
        translateAndFill(t, block);
        // 切換辨識語言
        var detected = detectLang(t);
        currentLang = detected === 'zh' ? 'en-US' : 'zh-TW';
      } else {
        interimText += t;
      }
    }
    if (interimText) {
      if (!interimBlock) {
        interimBlock = createBlock(interimText, true);
        getConvo().appendChild(interimBlock);
      } else {
        interimBlock.querySelector('.original').textContent = interimText;
      }
      scrollBottom();
    }
  };

  r.onend = function() {
    if (isListening) restartRecognition();
  };

  return r;
}

function restartRecognition() {
  recognition = initRecognition(currentLang);
  if (recognition) recognition.start();
}

// ── Controls ──
function toggleMic() {
  if (isListening) { stopMic(); } else { startMic(); }
}

function startMic() {
  currentLang = 'zh-TW';
  recognition = initRecognition(currentLang);
  if (!recognition) return;
  isListening = true;
  recognition.start();
  document.getElementById('micBtn').classList.add('active');
}

function stopMic() {
  isListening = false;
  if (recognition) { recognition.stop(); recognition = null; }
  if (interimBlock) { interimBlock.remove(); interimBlock = null; }
  setStatus('idle', '待機中');
  document.getElementById('micBtn').classList.remove('active');
}

function clearAll() {
  interimBlock = null;
  getConvo().innerHTML = '<span class="empty-hint">開始收音後，對話將顯示於此…</span>';
}
</script>
</body>
</html>
