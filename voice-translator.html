<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時語音翻譯</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    background: #f5f5f7; color: #1d1d1f;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── Top bar ── */
  .top-bar {
    flex-shrink: 0;
    padding: 12px 20px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid #e0e0e5;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-title { display: flex; align-items: center; gap: 8px; }
  .top-title h1 { font-size: 1rem; font-weight: 600; color: #1d1d1f; letter-spacing: -0.02em; }
  .top-title span { font-size: 0.78rem; color: #86868b; }

  /* Compact language picker in top-right */
  .lang-picker {
    display: flex; align-items: center; gap: 6px;
    background: #f5f5f7; border: 1px solid #d2d2d7;
    border-radius: 12px; padding: 5px 10px;
  }
  .lang-picker select {
    border: none; background: transparent;
    font-size: 1.1rem; cursor: pointer; outline: none;
    -webkit-appearance: none; appearance: none;
    padding: 0; width: 28px; text-align: center;
  }
  .lang-picker .divider-icon { font-size: 0.75rem; color: #b0b0b8; }

  /* ── Conversation ── */
  .convo-area {
    flex: 1; overflow-y: auto;
    padding: 20px 20px 140px;
    background: #fff;
    display: flex; flex-direction: column; gap: 16px;
  }
  .convo-area::-webkit-scrollbar { width: 4px; }
  .convo-area::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 4px; }

  .sentence {
    display: flex; flex-direction: column; gap: 4px;
    padding-bottom: 16px; border-bottom: 1px solid #f0f0f5;
    animation: fadeIn 0.25s ease;
  }
  .sentence:last-child { border-bottom: none; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  /* Align bubbles by speaker */
  .sentence.speaker-a { align-items: flex-start; }
  .sentence.speaker-b { align-items: flex-end; }

  .bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 82%; }
  .sentence.speaker-b .bubble-wrap { align-items: flex-end; }

  .spk-label { font-size: 0.68rem; font-weight: 600; color: #b0b0b8; letter-spacing: 0.06em; text-transform: uppercase; }

  .original {
    font-size: 1.2rem; line-height: 1.7; color: #1d1d1f; letter-spacing: -0.01em;
  }
  .original.interim { color: #b0b0b8; font-style: italic; }
  .translation { font-size: 1.2rem; line-height: 1.7; color: #0071e3; letter-spacing: -0.01em; }
  .translating { color: #c0c0c8 !important; font-style: italic; font-size: 0.88rem !important; }
  .empty-hint { color: #c7c7cc; font-size: 0.9rem; text-align: center; margin: auto; }

  /* ── Bottom bar ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 20px 16px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid #e0e0e5; z-index: 10; gap: 10px;
  }

  /* Speaker toggle */
  .speaker-toggle {
    display: flex; align-items: center; gap: 0;
    border: 1.5px solid #d2d2d7; border-radius: 12px; overflow: hidden;
    width: 100%; max-width: 360px;
  }
  .spk-btn {
    flex: 1; padding: 8px 12px;
    background: none; border: none; font-family: inherit;
    font-size: 0.82rem; font-weight: 500; cursor: pointer;
    color: #86868b; transition: background 0.15s, color 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .spk-btn:first-child { border-right: 1.5px solid #d2d2d7; }
  .spk-btn.active { background: #0071e3; color: white; }
  .spk-dot {
    width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0;
    display: none;
  }
  .spk-btn.active .spk-dot { display: block; animation: pulse 1.2s infinite; }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(1.4); }
  }

  /* Mic row */
  .mic-row {
    display: flex; align-items: center; justify-content: center;
    width: 100%; position: relative;
  }
  .status-pill {
    position: absolute; left: 0;
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75rem; font-weight: 500; color: #86868b;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #d2d2d7; transition: background 0.3s; flex-shrink: 0;
  }
  .dot.listening  { background: #ff3b30; animation: pulse 1.2s infinite; }
  .dot.processing { background: #ff9f0a; animation: pulse 0.6s infinite; }

  .mic-btn {
    width: 52px; height: 52px; border-radius: 50%; border: none;
    background: #0071e3; color: white; font-size: 1.3rem; cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(0,113,227,0.35);
    display: flex; align-items: center; justify-content: center;
  }
  .mic-btn:hover { background: #0077ed; transform: scale(1.06); }
  .mic-btn.active { background: #ff3b30; box-shadow: 0 2px 12px rgba(255,59,48,0.4); animation: ring 1.6s infinite; }
  @keyframes ring {
    0%  { box-shadow: 0 0 0 0    rgba(255,59,48,0.4); }
    70% { box-shadow: 0 0 0 14px rgba(255,59,48,0);   }
    100%{ box-shadow: 0 0 0 0    rgba(255,59,48,0);   }
  }
  .clear-btn {
    position: absolute; right: 0; background: none; border: none;
    color: #0071e3; font-size: 0.82rem; font-family: inherit;
    font-weight: 500; cursor: pointer; padding: 6px 4px; transition: opacity 0.2s;
  }
  .clear-btn:hover { opacity: 0.65; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-title">
    <h1>🎙 即時翻譯</h1>
    <span>雙向對話翻譯</span>
  </div>
  <div class="lang-picker">
    <select id="selA" onchange="onLangChange()"></select>
    <span class="divider-icon">⇄</span>
    <select id="selB" onchange="onLangChange()"></select>
  </div>
</div>

<div class="convo-area" id="convoArea">
  <span class="empty-hint">選擇說話者，開始收音…</span>
</div>

<div class="bottom-bar">
  <!-- Speaker toggle -->
  <div class="speaker-toggle">
    <button class="spk-btn active" id="spkBtnA" onclick="setSpeaker('A')">
      <span class="spk-dot"></span>
      <span id="spkLabelA">🇹🇼 中文（繁體）</span>
    </button>
    <button class="spk-btn" id="spkBtnB" onclick="setSpeaker('B')">
      <span class="spk-dot"></span>
      <span id="spkLabelB">🇺🇸 英文</span>
    </button>
  </div>
  <!-- Mic -->
  <div class="mic-row">
    <div class="status-pill">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">待機中</span>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <button class="clear-btn" onclick="clearAll()">清除</button>
  </div>
</div>

<script>
var LANGS = [
  { code: 'zh-TW', mm: 'zh-TW', label: '🇹🇼 中文（繁體）', flag: '🇹🇼' },
  { code: 'zh-CN', mm: 'zh-CN', label: '🇨🇳 中文（簡體）', flag: '🇨🇳' },
  { code: 'en-US', mm: 'en-US', label: '🇺🇸 英文',         flag: '🇺🇸' },
  { code: 'ja-JP', mm: 'ja',    label: '🇯🇵 日文',         flag: '🇯🇵' },
  { code: 'ko-KR', mm: 'ko',    label: '🇰🇷 韓文',         flag: '🇰🇷' },
  { code: 'fr-FR', mm: 'fr',    label: '🇫🇷 法文',         flag: '🇫🇷' },
  { code: 'de-DE', mm: 'de',    label: '🇩🇪 德文',         flag: '🇩🇪' },
  { code: 'es-ES', mm: 'es',    label: '🇪🇸 西班牙文',     flag: '🇪🇸' },
  { code: 'th-TH', mm: 'th',    label: '🇹🇭 泰文',         flag: '🇹🇭' },
  { code: 'vi-VN', mm: 'vi',    label: '🇻🇳 越南文',       flag: '🇻🇳' },
];

var selA = document.getElementById('selA');
var selB = document.getElementById('selB');
LANGS.forEach(function(l, i) {
  selA.add(new Option(l.flag, i));
  selB.add(new Option(l.flag, i));
});
selA.value = 0; selB.value = 2;

function getLangA() { return LANGS[parseInt(selA.value)]; }
function getLangB() { return LANGS[parseInt(selB.value)]; }

function onLangChange() {
  updateSpkLabels();
  if (isListening) {
    if (recognition) { recognition.stop(); recognition = null; }
    setTimeout(function() {
      if (!isListening) return;
      recognition = initRecognition();
      if (recognition) recognition.start();
    }, 200);
  }
}

function updateSpkLabels() {
  document.getElementById('spkLabelA').textContent = getLangA().label;
  document.getElementById('spkLabelB').textContent = getLangB().label;
}
selA.addEventListener('change', updateSpkLabels);
selB.addEventListener('change', updateSpkLabels);

// ── Speaker state ──
var currentSpeaker = 'A'; // 'A' or 'B'

function setSpeaker(s) {
  currentSpeaker = s;
  document.getElementById('spkBtnA').className = 'spk-btn' + (s === 'A' ? ' active' : '');
  document.getElementById('spkBtnB').className = 'spk-btn' + (s === 'B' ? ' active' : '');
  if (isListening) {
    if (recognition) { recognition.stop(); recognition = null; }
    setTimeout(function() {
      if (!isListening) return;
      recognition = initRecognition();
      if (recognition) recognition.start();
    }, 200);
  }
}

function getActiveLang() { return currentSpeaker === 'A' ? getLangA() : getLangB(); }
function getTargetLang() { return currentSpeaker === 'A' ? getLangB() : getLangA(); }

var currentSpeaker = 'A';

// ── State ──
var recognition = null;
var isListening = false;
var interimBlock = null;
var pendingRestart = false; // 旗標：onend 觸發時需要重啟

// ── Helpers ──
function getConvo() { return document.getElementById('convoArea'); }
function removeEmptyHint() { var h = getConvo().querySelector('.empty-hint'); if (h) h.remove(); }
function scrollBottom() { var c = getConvo(); c.scrollTop = c.scrollHeight; }
function setStatus(type, text) {
  var d = document.getElementById('statusDot');
  d.className = 'dot';
  if (type === 'listening')  d.classList.add('listening');
  if (type === 'processing') d.classList.add('processing');
  document.getElementById('statusText').textContent = text;
}

// ── DOM ──
function createBlock(text, isInterim, speaker) {
  var block = document.createElement('div');
  block.className = 'sentence speaker-' + speaker.toLowerCase();
  var wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';
  var lbl = document.createElement('div');
  lbl.className = 'spk-label';
  lbl.textContent = speaker === 'A' ? getLangA().label : getLangB().label;
  var orig = document.createElement('div');
  orig.className = 'original' + (isInterim ? ' interim' : '');
  orig.textContent = text;
  var trans = document.createElement('div');
  trans.className = 'translation';
  wrap.appendChild(lbl);
  wrap.appendChild(orig);
  wrap.appendChild(trans);
  block.appendChild(wrap);
  return block;
}

// ── Translation ──
async function translateAndFill(text, block) {
  var tEl = block.querySelector('.translation');
  var src = getActiveLang().mm;
  var tgt = getTargetLang().mm;
  if (src === tgt) { tEl.textContent = ''; return; }

  tEl.textContent = '…';
  tEl.classList.add('translating');
  setStatus('processing', '翻譯中…');
  try {
    var url = 'https://api.mymemory.translated.net/get?q='
      + encodeURIComponent(text) + '&langpair=' + src + '|' + tgt;
    var resp = await fetch(url);
    var data = await resp.json();
    if (data.responseStatus !== 200) throw new Error(data.responseDetails);
    tEl.textContent = data.responseData.translatedText;
    tEl.classList.remove('translating');
  } catch(e) {
    tEl.textContent = '（翻譯失敗）';
    tEl.classList.remove('translating');
  }
  setStatus('listening', '收音中…');
  scrollBottom();
}

// ── Speech Recognition ──
function initRecognition() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('error', '⚠ 請使用 Chrome'); return null; }
  var r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = getActiveLang().code;

  r.onstart = function() { setStatus('listening', '收音中…'); };
  r.onerror = function(e) {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    setStatus('idle', '錯誤：' + e.error);
  };
  r.onend = function() {
    if (!isListening) return;
    if (recognition === r) { // 只有當前 recognition 才重啟，避免舊實例干擾
      setTimeout(function() {
        if (!isListening) return;
        recognition = initRecognition();
        if (recognition) recognition.start();
      }, 150);
    }
  };
  r.onresult = function(e) {
    removeEmptyHint();
    var spk = currentSpeaker;
    var interimText = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      var t = e.results[i][0].transcript.trim();
      if (e.results[i].isFinal) {
        if (interimBlock) { interimBlock.remove(); interimBlock = null; }
        var block = createBlock(t, false, spk);
        getConvo().appendChild(block);
        scrollBottom();
        translateAndFill(t, block);
      } else {
        interimText += t;
      }
    }
    if (interimText) {
      if (!interimBlock) {
        interimBlock = createBlock(interimText, true, spk);
        getConvo().appendChild(interimBlock);
      } else {
        interimBlock.querySelector('.original').textContent = interimText;
      }
      scrollBottom();
    }
  };
  return r;
}

function toggleMic() { if (isListening) { stopMic(); } else { startMic(); } }

function startMic() {
  recognition = initRecognition();
  if (!recognition) return;
  isListening = true;
  recognition.start();
  document.getElementById('micBtn').classList.add('active');
}

function stopMic() {
  isListening = false;
  if (recognition) { recognition.stop(); recognition = null; }
  if (interimBlock) { interimBlock.remove(); interimBlock = null; }
  setStatus('idle', '待機中');
  document.getElementById('micBtn').classList.remove('active');
}

function clearAll() {
  interimBlock = null;
  getConvo().innerHTML = '<span class="empty-hint">選擇說話者，開始收音…</span>';
}
</script>
</body>
</html>
